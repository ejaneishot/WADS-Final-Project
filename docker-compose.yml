services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "this_password_is_very_long_you_know_cause_no_guessing"
      POSTGRES_DB: smartcareer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartcareer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    environment:
      # Overrides for container runtime (see .env for all other secrets/config)
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:this_password_is_very_long_you_know_cause_no_guessing@db:5432/smartcareer?schema=public
      RUN_DB_SEED: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
